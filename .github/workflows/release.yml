name: Release

# Tag a commit `vX.Y.Z` (matching package.json "version") and push the tag to
# build the Windows installer and publish it to a GitHub Release:
#   npm version patch   # bumps package.json + creates the tag
#   git push --follow-tags
on:
  push:
    tags: ['v*']

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write # create the GitHub Release and upload the installer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Installs the app deps incl. the platform opencode binary (postinstall).
      - run: npm ci

      - run: npm test

      # Scaffold + install the open-slide deck (slides/ is not committed); the
      # afterPack hook bundles it as the self-contained template.
      - name: Scaffold the slide deck
        run: npx --yes @open-slide/cli init slides --use-npm --no-git --force

      # Build the NSIS installer. Unsigned for now (no cert on the runner) — see
      # README. `--publish never` keeps electron-builder's own publisher out of
      # it: that publisher races on multi-artifact uploads and ends up creating
      # duplicate draft releases with the assets split between them. latest.yml is
      # still emitted because a github publish provider is configured.
      - name: Build installer
        run: npm run dist -- --publish never

      # Upload every artifact to a single GitHub Release for this tag (idempotent).
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
