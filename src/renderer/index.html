<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>open-slide studio</title>
    <style>
      /* dark (default) */
      :root {
        --bg:#0f1115; --panel:#1b1c1f; --line:#33343a; --text:#ececf1;
        --muted:#9a9ba3; --accent:#4f7cff; --field:#26272b; --user-bubble:#34353a;
      }
      /* light — applied when open-slide is in light mode */
      html.light {
        --bg:#ffffff; --panel:#f9f9f9; --line:#e5e5e7; --text:#0d0d0d;
        --muted:#6b6c70; --accent:#4f7cff; --field:#ffffff; --user-bubble:#f0f0f1;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
      #app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; transition: grid-template-columns .18s ease; }
      #app.collapsed { grid-template-columns: 44px 1fr; }

      /* ---- left: simplified chat ---- */
      #chat { display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--line); overflow: hidden; min-width: 0; }
      #chat header { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 8px; }
      #chat header .header-row { display: flex; align-items: center; gap: 8px; }
      #chat header .title { font-weight: 600; flex: 1; white-space: nowrap; }
      .iconbtn { background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: 6px; width: 28px; height: 28px; line-height: 1; font-size: 15px; cursor: pointer; flex: none; padding: 0; }
      .iconbtn:hover { color: var(--text); }
      /* collapsed: hide everything but the expand handle */
      #expand { display: none; margin: 10px auto; }
      #app.collapsed #chat > header,
      #app.collapsed #messages,
      #app.collapsed #composer { display: none; }
      #app.collapsed #expand { display: block; }
      #model { width: 100%; background: var(--field); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 13px; }
      #messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 18px; }
      .msg { line-height: 1.65; white-space: pre-wrap; word-break: break-word; font-size: 14px; }
      /* user: grey rounded bubble, right-aligned (ChatGPT style) */
      .msg.user { background: var(--user-bubble); color: var(--text); align-self: flex-end; max-width: 88%; padding: 9px 14px; border-radius: 20px; }
      /* assistant: no bubble, full-width plain text */
      .msg.agent { align-self: stretch; max-width: 100%; }
      .msg.thinking { color: var(--muted); font-size: 13px; }
      #messages::-webkit-scrollbar { width: 8px; }
      #messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

      /* composer: rounded box with a circular send button */
      #composer { padding: 10px 14px 16px; }
      .composer-box { display: flex; align-items: flex-end; gap: 6px; background: var(--field); border: 1px solid var(--line); border-radius: 26px; padding: 6px 6px 6px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
      #input { flex: 1; resize: none; background: transparent; color: var(--text); border: 0; outline: none; font: inherit; font-size: 14px; line-height: 1.5; padding: 7px 0; max-height: 160px; overflow-y: auto; }
      #send { flex: none; width: 34px; height: 34px; border-radius: 50%; border: 0; background: var(--text); color: var(--bg); display: grid; place-items: center; cursor: pointer; font-size: 17px; line-height: 1; }
      #send:disabled { opacity: .3; cursor: default; }

      /* ---- right: live slide view ---- */
      #preview { position: relative; background: var(--bg); }
      #frame { width: 100%; height: 100%; border: 0; display: flex; }
      #placeholder { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); text-align: center; padding: 24px; }
      #statusbar { position: absolute; bottom: 0; left: 0; right: 0; font-size: 12px; color: var(--muted); background: rgba(0,0,0,.45); padding: 6px 10px; }
    </style>
  </head>
  <body>
    <div id="app">
      <section id="chat">
        <button id="expand" class="iconbtn" title="展開">›</button>
        <header>
          <div class="header-row">
            <span class="title" id="title">🪄 描述你的投影片</span>
            <button id="collapse" class="iconbtn" title="收合">‹</button>
          </div>
          <select id="model" title="選擇 AI 模型"></select>
        </header>
        <div id="messages"></div>
        <div id="composer">
          <div class="composer-box">
            <textarea id="input" rows="1" placeholder="例如:做一份 5 頁、介紹我們新產品的簡報"></textarea>
            <button id="send" title="送出">↑</button>
          </div>
        </div>
      </section>
      <section id="preview">
        <webview id="frame" style="display:none" disablewebsecurity></webview>
        <div id="placeholder">投影片預覽載入中…</div>
        <div id="statusbar">啟動中…</div>
      </section>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
