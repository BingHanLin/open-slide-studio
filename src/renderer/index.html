<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>open-slide studio</title>
    <style>
      /* dark (default) */
      :root {
        --bg:#0f1115; --panel:#1b1c1f; --line:#33343a; --text:#ececf1;
        --muted:#9a9ba3; --accent:#4f7cff; --field:#26272b; --user-bubble:#34353a;
      }
      /* light — applied when open-slide is in light mode */
      html.light {
        --bg:#ffffff; --panel:#f9f9f9; --line:#e5e5e7; --text:#0d0d0d;
        --muted:#6b6c70; --accent:#4f7cff; --field:#ffffff; --user-bubble:#f0f0f1;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
      #app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; transition: grid-template-columns .18s ease; }
      #app.collapsed { grid-template-columns: 44px 1fr; }

      /* ---- left: Claude-style chat ---- */
      #chat { display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--line); overflow: hidden; min-width: 0; }
      #chat header { padding: 8px 8px 0; display: flex; justify-content: flex-end; }
      .iconbtn { background: transparent; color: var(--muted); border: 0; border-radius: 6px; width: 30px; height: 30px; line-height: 1; font-size: 17px; cursor: pointer; flex: none; padding: 0; }
      .iconbtn:hover { background: var(--user-bubble); color: var(--text); }
      /* collapsed: hide everything but the expand handle */
      #expand { display: none; margin: 10px auto; }
      #app.collapsed #chat > header,
      #app.collapsed #messages,
      #app.collapsed #composer { display: none; }
      #app.collapsed #expand { display: block; }

      #messages { flex: 1; overflow-y: auto; padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 16px; }
      .msg { line-height: 1.6; white-space: pre-wrap; word-break: break-word; font-size: 13px; }
      /* user: grey rounded bubble, right-aligned */
      .msg.user { background: var(--user-bubble); color: var(--text); align-self: flex-end; max-width: 88%; padding: 8px 13px; border-radius: 16px; }
      /* assistant: no bubble, full-width plain text */
      .msg.agent { align-self: stretch; max-width: 100%; }
      .msg.thinking { color: var(--muted); font-size: 12.5px; }
      #messages::-webkit-scrollbar { width: 8px; }
      #messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

      /* empty-state suggestion chips (shown only when conversation is empty) */
      #suggestions { display: none; flex-wrap: wrap; gap: 8px; padding: 0 14px 10px; }
      #suggestions.show { display: flex; }
      #app.collapsed #suggestions { display: none; }
      .chip { background: var(--field); border: 1px solid var(--line); border-radius: 16px; padding: 7px 12px; font-size: 12.5px; color: var(--text); cursor: pointer; }
      .chip:hover { background: var(--user-bubble); }
      /* selected-action pill inside the composer */
      .pill { display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; background: var(--user-bubble); color: var(--text); border-radius: 12px; padding: 3px 6px 3px 10px; font-size: 12px; }
      .pill .x { cursor: pointer; color: var(--muted); font-size: 14px; line-height: 1; }
      .pill .x:hover { color: var(--text); }

      /* composer: Claude-style — large input, toolbar with model (left) + send (right) */
      #composer { padding: 8px 14px 16px; }
      .composer-box { display: flex; flex-direction: column; gap: 8px; background: var(--field); border: 1px solid var(--line); border-radius: 18px; padding: 12px 12px 10px 14px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
      #input { resize: none; background: transparent; color: var(--text); border: 0; outline: none; font: inherit; font-size: 13px; line-height: 1.55; min-height: 58px; max-height: 200px; overflow-y: auto; }
      .composer-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .model-wrap { position: relative; display: inline-flex; align-items: center; }
      #model { appearance: none; -webkit-appearance: none; background: transparent; border: 0; color: var(--muted); font: inherit; font-size: 12px; font-weight: 500; padding: 3px 17px 3px 6px; border-radius: 6px; cursor: pointer; max-width: 220px; }
      #model:hover { background: var(--user-bubble); color: var(--text); }
      .model-wrap .chev { position: absolute; right: 5px; pointer-events: none; color: var(--muted); font-size: 9px; }
      #send { flex: none; width: 30px; height: 30px; border-radius: 50%; border: 0; background: var(--text); color: var(--bg); display: grid; place-items: center; cursor: pointer; font-size: 16px; line-height: 1; }
      #send:disabled { opacity: .3; cursor: default; }

      /* ---- right: live slide view ---- */
      #preview { position: relative; background: var(--bg); }
      #frame { width: 100%; height: 100%; border: 0; display: flex; }
      #placeholder { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); text-align: center; padding: 24px; }
      /* hidden by default — only flashes for real errors */
      #statusbar { display: none; position: absolute; bottom: 12px; left: 12px; right: 12px; font-size: 12px; color: #fff; background: rgba(178,40,40,.94); border-radius: 8px; padding: 8px 12px; box-shadow: 0 2px 10px rgba(0,0,0,.25); }
      #statusbar.show { display: block; }
    </style>
  </head>
  <body>
    <div id="app">
      <section id="chat">
        <button id="expand" class="iconbtn" title="展開">›</button>
        <header>
          <button id="collapse" class="iconbtn" title="收合">‹</button>
        </header>
        <div id="messages"></div>
        <div id="suggestions"></div>
        <div id="composer">
          <div class="composer-box">
            <div id="pill" class="pill" style="display:none"><span id="pill-label"></span><span class="x" id="pill-x">×</span></div>
            <textarea id="input" rows="3" placeholder="例如:做一份 5 頁、介紹我們新產品的簡報"></textarea>
            <div class="composer-toolbar">
              <div class="model-wrap">
                <select id="model" title="選擇 AI 模型"></select>
                <span class="chev">▾</span>
              </div>
              <button id="send" title="送出">↑</button>
            </div>
          </div>
        </div>
      </section>
      <section id="preview">
        <webview id="frame" style="display:none" disablewebsecurity></webview>
        <div id="placeholder">投影片預覽載入中…</div>
        <div id="statusbar"></div>
      </section>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
