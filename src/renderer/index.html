<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; frame-src http://localhost:* ; style-src 'self' 'unsafe-inline';" />
    <title>open-slide studio</title>
    <style>
      :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --text:#e6e8ec; --muted:#8b93a3; --accent:#4f7cff; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
      #app { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }

      /* ---- left: simplified chat ---- */
      #chat { display: flex; flex-direction: column; background: var(--panel); border-right: 1px solid var(--line); }
      #chat header { padding: 14px 16px; font-weight: 600; border-bottom: 1px solid var(--line); }
      #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
      .msg { padding: 10px 12px; border-radius: 10px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
      .msg.user { background: var(--accent); color: #fff; align-self: flex-end; max-width: 85%; }
      .msg.agent { background: #20242e; align-self: flex-start; max-width: 90%; }
      .msg.thinking { color: var(--muted); font-style: italic; }
      #composer { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--line); }
      #input { flex: 1; resize: none; background: #20242e; color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 10px; font: inherit; }
      #send { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 0 18px; font-weight: 600; cursor: pointer; }
      #send:disabled { opacity: .5; cursor: default; }

      /* ---- right: live slide view ---- */
      #preview { position: relative; background: #000; }
      #frame { width: 100%; height: 100%; border: 0; }
      #placeholder { position: absolute; inset: 0; display: grid; place-items: center; color: var(--muted); text-align: center; padding: 24px; }
      #statusbar { position: absolute; bottom: 0; left: 0; right: 0; font-size: 12px; color: var(--muted); background: rgba(0,0,0,.55); padding: 6px 10px; }
    </style>
  </head>
  <body>
    <div id="app">
      <section id="chat">
        <header>🪄 描述你的投影片</header>
        <div id="messages"></div>
        <div id="composer">
          <textarea id="input" rows="2" placeholder="例如:做一份 5 頁、介紹我們新產品的簡報"></textarea>
          <button id="send">送出</button>
        </div>
      </section>
      <section id="preview">
        <iframe id="frame" style="display:none"></iframe>
        <div id="placeholder">投影片預覽載入中…<br />(open-slide dev server 啟動需要幾秒)</div>
        <div id="statusbar">啟動中…</div>
      </section>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
